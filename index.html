<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Приказы — СТ Эсэмбли</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 mb-1">Генератор кадровых приказов</h1>
            <p class="text-muted mb-4">ТОО «СТ Эсэмбли» — документ формируется на русском и казахском языках</p>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label" for="orderType">Тип приказа</label>
                <select id="orderType" class="form-select">
                  <option value="">Выберите тип</option>
                  <option value="annualVacationUnused">Ежегодный отпуск (неиспользованная часть)</option>
                  <option value="annualVacationWorked">Ежегодный отпуск (за отработанный период)</option>
                  <option value="vacationRecall">Отзыв из ежегодного отпуска</option>
                  <option value="paidLeaveRetention">Отпуск с сохранением заработной платы</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label" for="orderNumber">№ приказа</label>
                <input id="orderNumber" type="number" min="1" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label" for="orderDate">Дата приказа</label>
                <input id="orderDate" type="date" class="form-control">
              </div>
            </div>

            <div id="dynamicForm" class="border-top pt-3"></div>

            <button id="generateBtn" class="btn btn-primary mt-4">
              Скачать приказ (DOCX, RU + KZ)
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://unpkg.com/docx@9.5.0/build/index.umd.js"></script>
  <script src="https://unpkg.com/petrovich@0.2.1/dist/petrovich.min.js"></script>
  <script src="storage.js"></script>
  <script src="morph.js"></script>
  <script src="utils.js"></script>
  <script src="templates.js"></script>
  <script src="app.js"></script>
</body>
</html>
